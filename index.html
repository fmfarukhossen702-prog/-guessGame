<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />

  </head>
  <body class="h-screen  flex justify-center items-center">

    <!-- first part  -->
    <div class="box box1   bg-[url('../image/box1Bg.jpg')] bg-no-repeat bg-center bg-cover">
      <h1 class="text-3xl font-bold">Play The Guess And Win Game</h1>
      <div class="flex flex-col justify-center gap-5 mt-15">
        <input class="input1   inputStyle bg-[#000b0a7d]" type="text" name="" id="" placeholder="Enter Name : your or favorite country" >
        <p class="pera1 h-7 font-semibold text-[#e4f998] block "></p>
        <button class="btn1     btn">Submit</button>
      </div>
    </div>


    <!-- secend part  -->
    <div class="box box2 hidden bg-[url('../image/box2Bg.jpg')] bg-no-repeat bg-cover bg-center">
      <h1 class="heading2 text-3xl font-semibold"></h1>
      <div class="flex flex-col justify-center gap-5 mt-20">
        <input class="inputNumber2   inputStyle " type="number" name="" id="" placeholder="Enter your number" >
          <p class="pera2 h-7 text-[#20d7e4] text-xl block "></p>
        <button class="btn2     btn">Submit</button>
      </div>
    </div>


    <!-- third part  -->
    <div class="box box3 hidden bg-[url('../image/box3Bg.jpg')] bg-no-repeat bg-cover bg-center">
      <h1 class="heading3 text-3xl font-semibold"></h1>
      <div class="flex flex-col justify-center gap-5 mt-20">
        <input class="inputText3   inputStyle " type="text" name="" id="" placeholder="Enter Name : your or favorite country " >
             <p class="pera3 h-7 font-semibold text-lg  text-[#ff48ff] block "></p>
        <button class="btn3     btn">Submit</button>
      </div>
    </div>


    <!-- fourth part -->
    <div class="box box4 hidden bg-[url('../image/box4Bg.jpg')] bg-no-repeat bg-cover bg-center">
      <h1 class="heading4 font-semibold text-3xl"></h1>
      <div class="flex flex-col justify-center gap-5 mt-20">
        <input class="inputNumber4   inputStyle " type="number" name="" id="" placeholder="Enter your number" >
            <p class="pera4 h-7 text-xl text-[#46ffff] block "></p>

        <button class="btn4     btn">Submit</button>
      </div>
    </div>

    <div class="box box5  hidden">
      <div class=" box5Text flex w-full h-full justify-center items-center text-4xl font-bold text-center">Waiting...</div>

    </div>
    <div class="box box6  hidden ">
      <div class=" box6Text flex w-full h-full justify-center items-center text-[#ff0000] text-4xl font-bold text-center">Waitingg...</div>

    </div>




    <script src="script.js"></script>
